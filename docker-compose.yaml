services:
  api:
    build: 
      /api/
    ports:
      - 80:80
  db:
  image: postgres
  restart: always
  user: postgres
  secrets:
    - db-password
  volumes:
    - db-data:/var/lib/postgresql/data
  environment:
    - POSTGRES_DB=example
    - POSTGRES_PASSWORD_FILE=/run/secrets/db-password
  expose:
    - 5432
  healthcheck:
    test: [ "CMD", "pg_isready" ]
    interval: 10s
    timeout: 5s
    retries: 5
